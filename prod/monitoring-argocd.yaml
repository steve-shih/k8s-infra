# ==============================================================================
# 檔案名稱 (File): prod/monitoring-argocd.yaml
# 負責元件 (Component): PLG 監控系統 (Prometheus + Loki + Grafana)
# 檔案用途 (Purpose): 透過 ArgoCD 自動部署官方 Helm Charts，建立全叢集的指標與日誌監控大腦。
# 關聯設定 (Dependencies): 依賴外部 Helm Repo (prometheus-community, grafana)。
# ==============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    targetRevision: 65.2.0
    chart: kube-prometheus-stack
    helm:
      values: |
        grafana:
          adminPassword: "admin"
        prometheus:
          prometheusSpec:
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    targetRevision: 2.10.2
    chart: loki-stack
    helm:
      values: |
        grafana:
          enabled: false
        prometheus:
          enabled: false
        loki:
          persistence:
            enabled: true
            size: 10Gi
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
