# ==============================================================================
# 檔案名稱 (File): prod/daynote.yaml
# 負責元件 (Component): DayNote 筆記系統
# 檔案用途 (Purpose): 部署 DayNote 前後端 (Deployment/Service)、本地存儲 (PVC)，與專屬的 daynote-ingress。
# 關聯設定 (Dependencies): 依賴 daynote namespace 內的 db-secrets 取得 MongoDB URI 與 GCP 憑證。
# ==============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: daynote
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: daynote-backend
  namespace: daynote
spec:
  replicas: 1
  selector:
    matchLabels:
      app: daynote-backend
  template:
    metadata:
      labels:
        app: daynote-backend
      annotations:
        rollout/restartedAt: "2026-07-03T00:51:17Z"
    spec:
      containers:
        - name: daynote-backend
          image: ghcr.io/steve-shih/daynotehtml-daynote-backend:main
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: DAYNOTE_MONGO_URI
            - name: ATLAS_MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: DAYNOTE_MONGO_URI
            - name: PORT
              value: "5000"
            - name: GCS_BUCKET_NAME
              value: "petpa"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/app/secrets/gcp-service-account.json"
            - name: LOCAL_AI_URL
              value: "http://49.158.138.26:8001"
            - name: LOCAL_AI_KEY
              value: "my_secure_api_key_2026"
          volumeMounts:
            - name: daynote-data
              mountPath: /app/data
            - name: gcp-key
              mountPath: "/app/secrets"
              readOnly: true
      volumes:
        - name: gcp-key
          secret:
            secretName: db-secrets
            items:
              - key: gcp-service-account.json
                path: gcp-service-account.json
        - name: daynote-data
          persistentVolumeClaim:
            claimName: daynote-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: daynote-backend
  namespace: daynote
spec:
  selector:
    app: daynote-backend
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: daynote-frontend
  namespace: daynote
spec:
  replicas: 1
  selector:
    matchLabels:
      app: daynote-frontend
  template:
    metadata:
      labels:
        app: daynote-frontend
      annotations:
        rollout/restartedAt: "2026-07-03T00:51:17Z"
    spec:
      containers:
        - name: daynote-frontend
          image: ghcr.io/steve-shih/daynotehtml-daynote-frontend:main
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: daynote-frontend
  namespace: daynote
spec:
  selector:
    app: daynote-frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: daynote-data-pvc
  namespace: daynote
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: daynote-ingress
  namespace: daynote
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - area.petpa.tw
    secretName: area-tls
  rules:
  - host: area.petpa.tw
    http:
      paths:
      - path: /daynote/?(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: daynote-frontend
            port:
              number: 3000
