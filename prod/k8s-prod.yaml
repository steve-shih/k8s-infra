
# 1. Tire ERP
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tire-erp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tire-erp
  template:
    metadata:
      labels:
        app: tire-erp
    spec:
      containers:
        - name: tire-erp
          image: ghcr.io/steve-shih/tire_erp-tire-erp:master
          imagePullPolicy: Always

          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: TIRE_ERP_MONGO_URI
---
apiVersion: v1
kind: Service
metadata:
  name: tire-erp
spec:
  selector:
    app: tire-erp
  ports:
    - port: 8000
      targetPort: 8000
---
