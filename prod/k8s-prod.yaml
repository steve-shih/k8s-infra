---
# 3. daynote-backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: daynote-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: daynote-backend
  template:
    metadata:
      labels:
        app: daynote-backend
    spec:
      containers:
        - name: daynote-backend
          image: ghcr.io/steve-shih/daynotehtml-daynote-backend:main

          ports:
            - containerPort: 5000
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: DAYNOTE_MONGO_URI
            - name: PORT
              value: "5000"
            - name: GCS_BUCKET_NAME
              value: "petpa"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/app/secrets/gcp-service-account.json"
          volumeMounts:
            - name: daynote-data
              mountPath: /app/data
            - name: gcp-key
              mountPath: "/app/secrets"
              readOnly: true
      volumes:
        - name: gcp-key
          secret:
            secretName: db-secrets
            items:
              - key: gcp-service-account.json
                path: gcp-service-account.json
        - name: daynote-data
          persistentVolumeClaim:
            claimName: daynote-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: daynote-backend
spec:
  selector:
    app: daynote-backend
  ports:
    - port: 5000
      targetPort: 5000
---
