---
# 5. Pet Adoption
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pet-adoption
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pet-adoption
  template:
    metadata:
      labels:
        app: pet-adoption
    spec:
      containers:
        - name: pet-adoption
          image: ghcr.io/steve-shih/pet-adoption-signing-pet-adoption:main

          ports:
            - containerPort: 5000
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: PET_MONGODB_URI
          
          volumeMounts:
            - name: pet-data
              mountPath: /app/data

      volumes:
        - name: pet-data
          persistentVolumeClaim:
            claimName: pet-adoption-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: pet-adoption
spec:
  selector:
    app: pet-adoption
  ports:
    - port: 5000
      targetPort: 5000

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: daynote-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pet-adoption-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: erp-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - erp.wheel.petpa.tw
    secretName: erp-tls
  rules:
  - host: erp.wheel.petpa.tw
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tire-erp
            port:
              number: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: area-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - area.petpa.tw
    secretName: area-tls
  rules:
  - host: area.petpa.tw
    http:
      paths:
      - path: /daynote/api/?(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: daynote-backend
            port:
              number: 5000
      - path: /daynote/?(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: daynote-frontend
            port:
              number: 3000
      - path: /feeding/?(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: feeding
            port:
              number: 3000
      - path: /petlive/?(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: pet-adoption
            port:
              number: 5000
