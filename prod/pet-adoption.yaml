# ==============================================================================
# 檔案名稱 (File): prod/pet-adoption.yaml
# 負責元件 (Component): 寵物領養平台 (Pet Adoption)
# 檔案用途 (Purpose): 部署寵物領養平台的 Deployment、Service、PVC 以及專屬 Ingress。
# 關聯設定 (Dependencies): 依賴 pet-adoption namespace 內的 db-secrets 與 area-tls 憑證。
# ==============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: pet-adoption
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pet-adoption
  namespace: pet-adoption
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pet-adoption
  template:
    metadata:
      labels:
        app: pet-adoption
    spec:
      containers:
        - name: pet-adoption
          image: ghcr.io/steve-shih/pet-adoption-signing-pet-adoption:main
          ports:
            - containerPort: 5000
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: PET_MONGODB_URI
          volumeMounts:
            - name: pet-data
              mountPath: /app/data
      volumes:
        - name: pet-data
          persistentVolumeClaim:
            claimName: pet-adoption-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: pet-adoption
  namespace: pet-adoption
spec:
  selector:
    app: pet-adoption
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pet-adoption-pvc
  namespace: pet-adoption
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pet-adoption-ingress
  namespace: pet-adoption
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - area.petpa.tw
    secretName: area-tls
  rules:
  - host: area.petpa.tw
    http:
      paths:
      - path: /pet/?(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: pet-adoption
            port:
              number: 5000
