apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: steve-prod-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/steve-shih/k8s-infra.git'
    targetRevision: main
    path: prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
